services:
  - type: web
    name: synthtrade-backend
    runtime: python
    plan: free
    buildCommand: cd synthtrade/backend && pip install -r requirements.txt
    startCommand: cd synthtrade/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8008
      - key: PYTHON_VERSION
        value: 3.11.0
      # Supabase credentials - configure in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Binance credentials - configure in Render dashboard
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_API_KEY_LIVE
        sync: false
      - key: BINANCE_SECRET_KEY_LIVE
        sync: false
      # App configuration
      - key: TRADING_MODE
        value: test
      - key: ALLOW_LIVE_MODE
        value: false
      - key: PAPER_TRADING
        value: true
      - key: APP_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: 1440
      # AI Configuration
      - key: AI_PRIMARY_PROVIDER
        value: openrouter
      - key: AI_PRIMARY_MODEL
        value: anthropic/claude-3-haiku
      - key: AI_API_KEY
        sync: false
      - key: AI_API_BASE_URL
        value: https://openrouter.ai/api/v1
      # CORS - IMPORTANT: Update after GitHub Pages URL is known
      - key: CORS_ORIGINS
        value: https://otto78.github.io,https://synthtrade.onrender.com
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: 8008
      - key: LOG_LEVEL
        value: INFO
      # Scalping configuration
      - key: MAX_CONCURRENT_POSITIONS
        value: 1
      - key: MAX_DAILY_LOSS_EUR
        value: 15
      - key: DEFAULT_POSITION_SIZE_PCT
        value: 0.05
      - key: DEFAULT_STOP_LOSS_PCT
        value: 0.02
      - key: DEFAULT_TAKE_PROFIT_PCT
        value: 0.04

    healthCheckPath: /health
