name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'synthtrade/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
      - 'synthtrade/frontend/synthtrade-ui/angular.json'
      - 'synthtrade/frontend/synthtrade-ui/package.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: synthtrade/frontend/synthtrade-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd synthtrade/frontend/synthtrade-ui
          npm ci

      - name: Build Angular app
        run: |
          cd synthtrade/frontend/synthtrade-ui
          npm run build:prod
        env:
          CI: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: synthtrade/frontend/synthtrade-ui/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
